<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <!-- Fond sombre avec dégradé radial bleu nuit -->
    <radialGradient id="bg" cx="60%" cy="100%" r="90%">
      <stop offset="0%"  stop-color="#0a1a3a"/>
      <stop offset="55%" stop-color="#03040e"/>
    </radialGradient>
    <!-- Glow bleu centré bas -->
    <radialGradient id="glow" cx="50%" cy="100%" r="60%">
      <stop offset="0%"  stop-color="#1a55ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a55ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow secondaire droite -->
    <radialGradient id="glow2" cx="80%" cy="80%" r="40%">
      <stop offset="0%"  stop-color="#4488ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4488ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Masque dégradé pour l'arabe (fade gauche→droite) -->
    <linearGradient id="arabic-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="white" stop-opacity="0"/>
      <stop offset="12%" stop-color="white" stop-opacity="1"/>
      <stop offset="70%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <mask id="arabic-mask">
      <rect width="1024" height="500" fill="url(#arabic-fade)"/>
    </mask>
    <!-- Clip pour le fond -->
    <clipPath id="clip">
      <rect width="1024" height="500"/>
    </clipPath>
  </defs>

  <!-- Fond -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#glow)"/>
  <rect width="1024" height="500" fill="url(#glow2)"/>

  <!-- Ligne décorative subtile en haut -->
  <line x1="0" y1="1" x2="1024" y2="1" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Verset arabe décoratif en arrière-plan (grand, semi-transparent) -->
  <!-- "قُلْ لَنْ يُصِيبَنَا إِلَّا مَا كَتَبَ اللَّهُ لَنَا" -->
  <text
    x="512" y="310"
    font-family="'Scheherazade New', 'KFGQPC Uthmanic Script HAFS', serif"
    font-size="112"
    text-anchor="middle"
    fill="rgba(255,255,255,0.05)"
    mask="url(#arabic-mask)"
    direction="rtl"
    unicode-bidi="bidi-override"
  >قُرَآنٌ كَرِيمٌ</text>

  <!-- Séparateur décoratif gauche -->
  <line x1="64" y1="210" x2="64" y2="290" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Label surtexte -->
  <text
    x="512" y="193"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="600"
    letter-spacing="5"
    text-anchor="middle"
    fill="rgba(255,255,255,0.30)"
    text-transform="uppercase"
  >BY ISLAMSOUNNAH</text>

  <!-- Titre principal QURANI -->
  <text
    x="512" y="268"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="96"
    font-weight="900"
    letter-spacing="-2"
    text-anchor="middle"
    fill="#ffffff"
  >QURANI</text>

  <!-- Tagline -->
  <text
    x="512" y="318"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="19"
    font-weight="400"
    letter-spacing="0.5"
    text-anchor="middle"
    fill="rgba(255,255,255,0.45)"
  >Lisez, mémorisez et vivez le Coran</text>

  <!-- Points décoratifs -->
  <circle cx="430" cy="350" r="2" fill="rgba(255,255,255,0.15)"/>
  <circle cx="512" cy="350" r="2" fill="rgba(255,255,255,0.25)"/>
  <circle cx="594" cy="350" r="2" fill="rgba(255,255,255,0.15)"/>

  <!-- Ligne décorative bas -->
  <line x1="0" y1="499" x2="1024" y2="499" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
</svg>
